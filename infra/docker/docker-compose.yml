# ============================================================================
#  BulkSend — local development stack
#  Postgres 15 · Redis 7 · Kafka 3.8 (KRaft, no Zookeeper) · Redpanda Console
#
#  Usage:  cp .env.example .env  &&  docker compose up -d
# ============================================================================
name: bulksend

services:
  # --------------------------------------------------------------------------
  #  PostgreSQL 15 — primary database (Prisma points DATABASE_URL here)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: bulksend-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bulksend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --------------------------------------------------------------------------
  #  Redis 7 — rate limiting, suppression cache, progress counters, sessions
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bulksend-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - bulksend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # --------------------------------------------------------------------------
  #  Kafka 3.8 — KRaft mode (combined broker + controller, no Zookeeper)
  # --------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: bulksend-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - bulksend
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  # --------------------------------------------------------------------------
  #  Redpanda Console — web UI for browsing topics, messages, consumer groups
  # --------------------------------------------------------------------------
  kafka-console:
    image: redpandadata/console:v2.7.2
    container_name: bulksend-kafka-console
    restart: unless-stopped
    ports:
      - "${KAFKA_CONSOLE_PORT:-8080}:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
      CONFIG_FILEPATH: ""
    networks:
      - bulksend
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
    name: bulksend_postgres_data
  redis_data:
    name: bulksend_redis_data
  kafka_data:
    name: bulksend_kafka_data

networks:
  bulksend:
    name: bulksend_network
    driver: bridge
