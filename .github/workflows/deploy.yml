name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.4'
  GCP_REGION: us-central1
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  # ─── Build Docker images and push to Artifact Registry ─────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation

    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      worker_image: ${{ steps.meta-worker.outputs.tags }}
      web_image: ${{ steps.meta-web.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build

      - name: Build & push API image
        id: meta-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/bulksend/api:${{ github.sha }}

      - name: Build & push Worker image
        id: meta-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/bulksend/worker:${{ github.sha }}

      - name: Build & push Web image
        id: meta-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/bulksend/web:${{ github.sha }}

  # ─── Deploy to Cloud Run ─────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API
        run: |
          gcloud run deploy bulksend-api \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/bulksend/api:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=3001 \
            --set-secrets="DATABASE_URL=bulksend-db-url:latest,REDIS_URL=bulksend-redis-url:latest,JWT_SECRET=bulksend-jwt-secret:latest,SENDGRID_API_KEY=bulksend-sendgrid-key:latest"

      - name: Deploy Worker
        run: |
          gcloud run deploy bulksend-worker \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/bulksend/worker:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --no-allow-unauthenticated \
            --port=3002 \
            --min-instances=1 \
            --set-secrets="DATABASE_URL=bulksend-db-url:latest,REDIS_URL=bulksend-redis-url:latest,KAFKA_BROKERS=bulksend-kafka-brokers:latest"

      - name: Deploy Web
        run: |
          gcloud run deploy bulksend-web \
            --image="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/bulksend/web:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=80

      - name: Output service URLs
        run: |
          echo "API:    $(gcloud run services describe bulksend-api    --region=${{ env.GCP_REGION }} --format='value(status.url)')"
          echo "Worker: $(gcloud run services describe bulksend-worker --region=${{ env.GCP_REGION }} --format='value(status.url)')"
          echo "Web:    $(gcloud run services describe bulksend-web    --region=${{ env.GCP_REGION }} --format='value(status.url)')"
